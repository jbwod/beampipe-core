info:
  name: Bulk Register Sources
  type: http
  seq: 1
  tags:
    - sources

http:
  method: POST
  url: "{{baseUrl}}/api/v1/sources/bulk"
  body:
    type: json
    data: |-
      {
        "items": [
          {
            "project_module": "",
            "source_identifier": "",
            "enabled": false
          }
        ]
      }
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: /api/v1/login
    refreshTokenUrl: "{{oauth_refresh_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/sources/bulk"
      method: POST
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "project_module": "",
                "source_identifier": "",
                "enabled": false
              }
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "created": [
              {
                "uuid": "",
                "project_module": "",
                "source_identifier": "",
                "created_at": "",
                "updated_at": "",
                "enabled": false,
                "last_checked_at": "",
                "last_attempted_at": "",
                "stale_after_hours": "",
                "discovery_signature": "",
                "discovery_claim_expires_at": "",
                "workflow_run_pending": false,
                "workflow_run_pending_at": ""
              }
            ],
            "existing": [
              {}
            ],
            "total_created": 0,
            "total_existing": 0
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/sources/bulk"
      method: POST
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "project_module": "",
                "source_identifier": "",
                "enabled": false
              }
            ]
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }
