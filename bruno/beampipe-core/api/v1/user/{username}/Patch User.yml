info:
  name: Patch User
  type: http
  seq: 2
  tags:
    - users

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/user/:username"
  params:
    - name: username
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "name": "",
        "username": "",
        "email": "",
        "profile_image_url": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/user/:username"
      method: PATCH
      params:
        - name: username
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "name": "",
            "username": "",
            "email": "",
            "profile_image_url": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/user/:username"
      method: PATCH
      params:
        - name: username
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "name": "",
            "username": "",
            "email": "",
            "profile_image_url": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }
