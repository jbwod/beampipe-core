info:
  name: Update Execution
  type: http
  seq: 2
  tags:
    - executions

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/executions/:execution_id"
  params:
    - name: execution_id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "status": "",
        "workflow_manifest": "",
        "scheduler_name": "",
        "scheduler_job_id": "",
        "last_error": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/executions/:execution_id"
      method: PATCH
      params:
        - name: execution_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "status": "",
            "workflow_manifest": "",
            "scheduler_name": "",
            "scheduler_job_id": "",
            "last_error": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "uuid": "",
            "project_module": "",
            "sources": [
              {
                "source_identifier": "",
                "sbids": ""
              }
            ],
            "archive_name": "",
            "created_at": "",
            "updated_at": "",
            "deployment_profile_id": "",
            "status": "pending",
            "execution_phase": "",
            "workflow_manifest": "",
            "scheduler_name": "",
            "scheduler_job_id": "",
            "retry_count": 0,
            "last_error": "",
