info:
  name: List Sources
  type: http
  seq: 1
  tags:
    - sources

http:
  method: GET
  url: "{{baseUrl}}/api/v1/sources"
  params:
    - name: project_module
      value: ""
      type: query
      disabled: true
    - name: enabled
      value: ""
      type: query
      disabled: true
    - name: page
      value: "1"
      type: query
    - name: items_per_page
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/sources"
      method: GET
      params:
        - name: project_module
          value: ""
          type: query
          disabled: true
        - name: enabled
          value: ""
          type: query
          disabled: true
        - name: page
          value: "1"
          type: query
        - name: items_per_page
          value: "10"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "data": [
              {
                "uuid": "",
                "project_module": "",
                "source_identifier": "",
                "created_at": "",
                "updated_at": "",
                "enabled": false,
                "last_checked_at": "",
                "last_attempted_at": "",
                "stale_after_hours": "",
                "discovery_signature": "",
                "discovery_claim_expires_at": "",
                "workflow_run_pending": false,
                "workflow_run_pending_at": ""
              }
            ],
            "total_count": 0,
            "has_more": false,
            "page": "",
            "items_per_page": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/sources"
      method: GET
      params:
        - name: project_module
          value: ""
          type: query
          disabled: true
        - name: enabled
          value: ""
          type: query
          disabled: true
        - name: page
          value: "1"
          type: query
        - name: items_per_page
          value: "10"
          type: query
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: |-
  List sources from the registry.

  Args:
      request: FastAPI request object
      db: Database session
      project_module: Filter by project module (e.g., "wallaby")
      enabled: Filter by enabled status (True/False)
      page: Page number (1-indexed)
      items_per_page: Number of items per page

  Returns:
      Paginated list of sources
