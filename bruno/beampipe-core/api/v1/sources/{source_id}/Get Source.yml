info:
  name: Get Source
  type: http
  seq: 1
  tags:
    - sources

http:
  method: GET
  url: "{{baseUrl}}/api/v1/sources/:source_id"
  params:
    - name: source_id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/sources/:source_id"
      method: GET
      params:
        - name: source_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/sources/:source_id"
      method: GET
      params:
        - name: source_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: |-
  Get a single source by UUID.

  Args:
      request: FastAPI request object
      source_id: Source UUID
      db: Database session

  Returns:
      Source registry entry details

  Raises:
      NotFoundException: If source not found
