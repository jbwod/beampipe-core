info:
  name: Update Source
  type: http
  seq: 2
  tags:
    - sources

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/sources/:source_id"
  params:
    - name: source_id
      value: 019d6c10-c327-7c2e-9c71-2126c18d1208
      type: path
  body:
    type: json
    data: |-
      {
        "enabled": "true"
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/sources/:source_id"
      method: PATCH
      params:
        - name: source_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "enabled": "",
            "stale_after_hours": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/sources/:source_id"
      method: PATCH
      params:
        - name: source_id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "enabled": "",
            "stale_after_hours": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }

docs: |-
  Update a source in the registry.

  Currently supports updating the enabled status of a source.

  Args:
      request: FastAPI request object
      source_id: Source UUID
      source_data: Update data (enabled status)
      current_user: Current authenticated user
      db: Database session

  Returns:
      Updated source registry entry

  Raises:
      NotFoundException: If source not found
