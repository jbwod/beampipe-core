info:
  name: Refresh Access Token
  type: http
  seq: 1
  tags:
    - login

http:
  method: POST
  url: "{{baseUrl}}/api/v1/refresh"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/refresh"
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
