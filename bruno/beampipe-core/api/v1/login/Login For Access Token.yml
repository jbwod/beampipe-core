info:
  name: Login For Access Token
  type: http
  seq: 1
  tags:
    - login

http:
  method: POST
  url: "{{baseUrl}}/api/v1/login"
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: ""
      - name: username
        value: "{{username}}"
      - name: password
        value: "{{password}}"
      - name: scope
        value: ""
      - name: client_id
        value: ""
      - name: client_secret
        value: ""
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.access_token) {
          bru.setEnvVar("access_token", body.access_token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/api/v1/login"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: grant_type
            value: ""
          - name: username
            value: ""
          - name: password
            value: ""
          - name: scope
            value: ""
          - name: client_id
            value: ""
          - name: client_secret
            value: ""
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "access_token": "",
            "token_type": ""
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/api/v1/login"
      method: POST
      body:
        type: form-urlencoded
        data:
          - name: grant_type
            value: ""
          - name: username
            value: ""
          - name: password
            value: ""
          - name: scope
            value: ""
          - name: client_id
            value: ""
          - name: client_secret
            value: ""
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }
